service: gosh-backend-dynamodb

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${env:STAGE, 'dev'}
  memorySize: 512
  timeout: 30
  
  environment:
    NODE_ENV: ${env:NODE_ENV, 'production'}
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME, 'gosh-data-dev'}
    UPLOADS_BUCKET_NAME: ${env:UPLOADS_BUCKET_NAME}
    FRONTEND_BUCKET_NAME: ${env:FRONTEND_BUCKET_NAME}
    FRONTEND_URL: ${env:FRONTEND_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    ADMIN_EMAIL: ${env:ADMIN_EMAIL}
    ADMIN_PASSWORD: ${env:ADMIN_PASSWORD}
    AWS_REGION: ${env:AWS_REGION, 'us-east-1'}
    CLOUDFRONT_DOMAIN: ${env:CLOUDFRONT_DOMAIN, ''}
  
  iam:
    role:
      statements:
        # DynamoDB permissions
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
            - dynamodb:DescribeTable
            - dynamodb:DescribeStream
            - dynamodb:GetRecords
            - dynamodb:GetShardIterator
            - dynamodb:ListStreams
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${env:DYNAMODB_TABLE_NAME}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${env:DYNAMODB_TABLE_NAME}/index/*
        
        # S3 permissions for uploads bucket
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${env:UPLOADS_BUCKET_NAME}
            - arn:aws:s3:::${env:UPLOADS_BUCKET_NAME}/*
        
        # CloudWatch Logs permissions
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: arn:aws:logs:${aws:region}:${aws:accountId}:log-group:/aws/lambda/*

functions:
  api:
    handler: dist/lambda.handler
    description: GOSH Backend API (Lambda + DynamoDB)
    events:
      - http:
          path: /{proxy+}
          method: ANY
      - http:
          path: /
          method: ANY

plugins:
  - serverless-esbuild
  - serverless-dynamodb-local
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    target: node18
    exclude:
      - aws-sdk
  
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      seed: true
    seed:
      dev:
        sources:
          - table: ${env:DYNAMODB_TABLE_NAME}
            sources: [./seeds/dev-seed.json]
  
  offline:
    httpPort: 3001
    websocketPort: 3002
    lambdaPort: 3003
    dynamodbPort: 8000
